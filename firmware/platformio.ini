; TremoAI Smart Glove Firmware
; PlatformIO project configuration for ESP32-based IMU glove device
;
; Features implemented:
;   025-imu-kalman-fusion       MPU9250 6-axis IMU + Lauszus Kalman filter
;   030-esp32-mqtt              WiFi + MQTT publish pipeline
;   031-freertos-scheduler      FreeRTOS tasks, PID tremor control, CMG actuation
;   042-mpu6500-firmware-upgrade MPU6500 SPI sensor, GPIO13/14 actuator pin reassignment
;
; ── VS Code + PlatformIO IDE quick reference ─────────────────────────────────
;   Build only:       Ctrl+Alt+B   (or ☑ [Build] in status bar)
;   Upload:           Ctrl+Alt+U   (or → [Upload] in status bar)
;   Serial monitor:   Ctrl+Alt+S   (or 🔌 [Monitor] in status bar)
;   Clean:            PlatformIO sidebar > Project Tasks > Clean
;   Switch env:       Bottom status bar — click environment name
; ─────────────────────────────────────────────────────────────────────────────

; ── Global PlatformIO settings ───────────────────────────────────────────────
[platformio]
; Default environment used by Build / Upload / Monitor toolbar buttons
default_envs = esp32dev

; ── Shared settings (inherited by all [env:*] sections) ──────────────────────
[env]
platform  = espressif32
board     = esp32dev
framework = arduino

; 052-edge-ai-inference: the transpiled LightGBM model (~2 MB of read-only tree arrays in
; firmware/src/tremor_model.cpp) does not fit the default ~1.3 MB app partition. A custom
; no-OTA table gives a ~3.69 MB app partition so the model fits with comfortable headroom
; (huge_app's 3 MB app left only ~7% free). SPIFFS unused by this firmware.
board_build.partitions = partitions_edge.csv

; Upload baud rate — lowered to 460800 to avoid write timeout on CH340/CP210x
upload_speed = 460800
; upload_port = COM5

; Serial monitor baud — must match Serial.begin(115200) in main.cpp
monitor_speed = 115200

; Monitor filters:
;   time                 — prepend HH:MM:SS.mmm timestamp to every line
;   esp32_exception_decoder — decode guru meditation / stack traces automatically
monitor_filters = esp32_exception_decoder, time

; ── COM port: uncomment ONE pair below if PlatformIO cannot auto-detect ──────
; Windows  — check Device Manager > Ports > Silicon Labs CP210x or CH340
; upload_port = COM3
; monitor_port = COM3
;
; Linux    — typically /dev/ttyUSB0 or /dev/ttyACM0
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
;
; macOS    — typically /dev/cu.usbserial-* or /dev/cu.SLAB_USBtoUART
; upload_port = /dev/cu.usbserial-0001
; monitor_port = /dev/cu.usbserial-0001

; Library dependencies (resolved via PlatformIO registry on first build)
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.5
    https://github.com/256dpi/arduino-mqtt.git#v2.5.0
    ; 052-edge-ai-inference: the edge DSP (band-pass biquads + 128-pt FFT) ships as PORTABLE C++
    ; in firmware/src/edge_features.cpp so the host parity harness validates the exact shipped
    ; code, and at 10 Hz the cost is negligible. Espressif's esp-dsp (Xtensa-optimized FFT/biquad)
    ; is a permitted, optional accelerator — to enable it add the dependency below and swap
    ; fft_radix2()/biquad_cascade() for dsps_fft2r_*/dsps_biquad_f32 behind a build flag:
    ;   https://github.com/espressif/esp-dsp.git

; ── Production build environment (default) ───────────────────────────────────
; Silent core logging; no task statistics output.
; Use this for normal operation once the glove is tuned.
[env:esp32dev]
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DMQTT_MAX_PACKET_SIZE=512

; ── Debug build environment ───────────────────────────────────────────────────
; Enables FIRMWARE_DEBUG:
;   - Every 60 s: prints sensor / control / MQTT cycle counts, max latency,
;     and violation count to Serial
;   - ESP-IDF verbose core logging (level 3)
; Switch to this env from the status bar while developing / tuning.
[env:esp32dev-debug]
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DMQTT_MAX_PACKET_SIZE=512
    -DFIRMWARE_DEBUG
