openapi: 3.0.3
info:
  title: TremoAI Admin Stats API
  version: 1.0.0
  description: Admin-scoped aggregate statistics for the TremoAI center dashboard.

paths:
  /api/analytics/admin-stats/:
    get:
      summary: Get center-wide admin statistics
      description: >
        Returns the total number of doctor accounts and total patient records
        enrolled in the TremoAI center. Restricted to admin-role users only.
      operationId: getAdminStats
      tags:
        - Admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Admin statistics returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
              example:
                total_doctors: 5
                total_patients: 23
        '401':
          description: Authentication required — no token provided or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Authentication credentials were not provided.
        '403':
          description: Admin role required — authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Only admins can access the admin stats.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AdminStats:
      type: object
      required:
        - total_doctors
        - total_patients
      properties:
        total_doctors:
          type: integer
          minimum: 0
          description: Total number of users with role=doctor in the system
          example: 5
        total_patients:
          type: integer
          minimum: 0
          description: Total number of Patient records in the system
          example: 23

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
